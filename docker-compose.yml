version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15
    container_name: busbarranquilla_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-busadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-busbarranquilla123}
      POSTGRES_DB: ${POSTGRES_DB:-busbarranquilla}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis para tiempo real
  redis:
    image: redis:7-alpine
    container_name: busbarranquilla_redis
    ports:
      - "6379:6379"

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: busbarranquilla_backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-busadmin}:${POSTGRES_PASSWORD:-busbarranquilla123}@postgres:5432/${POSTGRES_DB:-busbarranquilla}
      JWT_SECRET: ${JWT_SECRET:-busbarranquilla_secret_key_2024}
      REDIS_URL: redis://redis:6379
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-pub_test_sKAvgbO6Oqpj2fHUHYESkub82tj7fdwp}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-prv_test_TVTQPaoE7Vse3lyPS8ZAEWOAzPIRZjfD}
      WOMPI_EVENT_SECRET: ${WOMPI_EVENT_SECRET:-test_events_Uf6Kl5MqSaU85sk5oi2Cg0SCfqVNcJhH}
      APP_URL: ${APP_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Frontend React + Vite
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: busbarranquilla_web
    environment:
      # El proxy de Vite reenvía /api/* a este host interno
      BACKEND_URL: http://backend:3000
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  postgres_data:
